name: Update plugin SHA pins

on:
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC
  workflow_dispatch:

jobs:
  update-pins:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # Check out with RELEASE_TOKEN (org-admin PAT) so the pin-bump commit can
      # push to main past the PR-required ruleset, via the Repository Admin
      # bypass — the same mechanism the source repos' release.yml relies on.
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Update pins
        run: |
          REPOS=("studious" "viva" "study-skills" "voice-suite" "dustjacket" "jig")
          CHANGED=false

          for REPO in "${REPOS[@]}"; do
            RELEASE=$(gh api /repos/jacquardlabs/$REPO/releases/latest 2>/dev/null) || continue
            TAG=$(echo "$RELEASE" | jq -r '.tag_name // empty')
            [ -z "$TAG" ] && echo "No release for $REPO, skipping" && continue

            REF_DATA=$(gh api /repos/jacquardlabs/$REPO/git/refs/tags/$TAG)
            TYPE=$(echo "$REF_DATA" | jq -r '.object.type')
            RAW_SHA=$(echo "$REF_DATA" | jq -r '.object.sha')

            if [ "$TYPE" = "tag" ]; then
              SHA=$(gh api /repos/jacquardlabs/$REPO/git/tags/$RAW_SHA | jq -r '.object.sha')
            else
              SHA="$RAW_SHA"
            fi

            CURRENT_SHA=$(jq -r --arg name "$REPO" '.plugins[] | select(.name == $name) | .source.sha // empty' .claude-plugin/marketplace.json)
            if [ "$SHA" != "$CURRENT_SHA" ]; then
              jq --arg name "$REPO" --arg sha "$SHA" \
                '(.plugins[] | select(.name == $name) | .source.sha) = $sha' \
                .claude-plugin/marketplace.json > tmp.json && mv tmp.json .claude-plugin/marketplace.json
              CHANGED=true
              echo "Updated $REPO: $TAG ($SHA)"
            else
              echo "No change for $REPO ($TAG)"
            fi
          done

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add .claude-plugin/marketplace.json
            git commit -m "chore: update plugin SHA pins"
            git push
          else
            echo "All pins up to date, nothing to commit"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

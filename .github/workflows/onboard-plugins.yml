name: Onboard new plugin repos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Log intended actions without creating branches, commits, PRs, or issues"
        type: boolean
        default: true

jobs:
  onboard:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Run onboarding scan
        run: bash .github/scripts/onboard-plugins.sh
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          DRY_RUN: ${{ inputs.dry_run }}
